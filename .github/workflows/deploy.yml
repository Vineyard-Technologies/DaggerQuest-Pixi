name: Deploy Game

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DaggerQuest
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for deployment
        run: npm run build -- --base /game/

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Vineyard-Technologies/DaggerQuest.com
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: target-repo

      - name: Deploy game files
        run: |
          rm -rf target-repo/public/game
          mkdir -p target-repo/public/game
          cp -r dist/* target-repo/public/game/

      - name: Install target repo dependencies
        working-directory: target-repo
        run: npm ci

      - name: Build React site
        working-directory: target-repo
        run: npm run build

      - name: Commit and push
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy game from DaggerQuest@${GITHUB_SHA::7}"
          git push
