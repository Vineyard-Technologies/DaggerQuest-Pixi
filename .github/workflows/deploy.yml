name: Deploy Game

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - test
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DaggerQuest
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for deployment
        run: npm run build -- --base /game/

      - name: Set target repo
        id: target
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "repo=Vineyard-Technologies/DaggerQuest.com" >> $GITHUB_OUTPUT
          else
            echo "repo=Vineyard-Technologies/DaggerQuest-Test-Realm" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.target.outputs.repo }}
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: target-repo

      - name: Deploy game files
        run: |
          rm -rf target-repo/public/game
          mkdir -p target-repo/public/game
          cp -r dist/* target-repo/public/game/

      - name: Commit and push
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy game from DaggerQuest@${GITHUB_SHA::7} (${{ inputs.environment }})"
          git push
