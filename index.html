<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <!-- <base href="/game/"> -->
    <title>DaggerQuest</title>
    <style>
        @font-face {
            font-family: 'Cinzel';
            src: url('fonts/cinzel-semibold.woff2') format('woff2');
            font-weight: 600;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: 'Grenze';
            src: url('fonts/grenze-semibold.woff2') format('woff2');
            font-weight: 600;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: 'Grenze';
            src: url('fonts/grenze-semibolditalic.woff2') format('woff2');
            font-weight: 600;
            font-style: italic;
            font-display: block;
        }
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
        }
        canvas {
            background-color: black;
        }

        /* ── Login Screen ─────────────────────────────────────────── */
        #login-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1209 0%, #0a0a0a 70%);
            z-index: 9999;
            font-family: 'Cinzel', 'Georgia', serif;
            color: #c8b06b;
            transition: opacity 0.5s ease;
        }
        #login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #login-title {
            font-size: 42px;
            letter-spacing: 4px;
            margin-bottom: 8px;
            color: #e2c97e;
            text-shadow: 0 0 20px rgba(226, 201, 126, 0.3);
        }
        #login-subtitle {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 16px;
            color: #8a7a52;
            margin-bottom: 36px;
            letter-spacing: 2px;
        }

        #login-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 280px;
        }
        #login-form input {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 16px;
            padding: 10px 14px;
            border: 1px solid #3a3020;
            border-radius: 4px;
            background: rgba(20, 16, 8, 0.8);
            color: #d4c28a;
            outline: none;
            transition: border-color 0.2s;
        }
        #login-form input::placeholder {
            color: #6a5e3e;
        }
        #login-form input:focus {
            border-color: #c8a84e;
        }
        #login-form button {
            font-family: 'Cinzel', 'Georgia', serif;
            font-size: 15px;
            padding: 11px 0;
            margin-top: 4px;
            border: 1px solid #5a4a28;
            border-radius: 4px;
            background: linear-gradient(180deg, #3a2e14 0%, #241c08 100%);
            color: #d4c28a;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.2s, border-color 0.2s;
        }
        #login-form button:hover {
            background: linear-gradient(180deg, #4a3e1c 0%, #2e2410 100%);
            border-color: #8a7430;
        }

        #login-error {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 14px;
            color: #cc6644;
            height: 20px;
            margin-top: 6px;
            text-align: center;
        }

        /* ── Loading Bar (after login) ────────────────────────────── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1209 0%, #0a0a0a 70%);
            z-index: 9998;
            font-family: 'Cinzel', 'Georgia', serif;
            color: #c8b06b;
            transition: opacity 0.5s ease;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-status {
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 24px;
            color: #a89860;
        }

        #loading-bar-track {
            width: 320px;
            height: 14px;
            border: 1px solid #3a3020;
            border-radius: 7px;
            background: rgba(20, 16, 8, 0.8);
            overflow: hidden;
        }
        #loading-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8a6e1e, #d4aa30);
            border-radius: 7px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Login overlay — renders instantly, no JS needed -->
    <div id="login-overlay">
        <div id="login-title">DaggerQuest</div>
        <div id="login-subtitle">Enter the realm</div>
        <form id="login-form" autocomplete="off">
            <input type="text" id="login-username" placeholder="Username" required autofocus />
            <input type="password" id="login-password" placeholder="Password" required />
            <button type="submit">Sign In</button>
        </form>
        <div id="login-error"></div>
    </div>

    <!-- Loading overlay — shown after successful login -->
    <div id="loading-overlay">
        <div id="loading-status">Loading...</div>
        <div id="loading-bar-track">
            <div id="loading-bar-fill"></div>
        </div>
    </div>

    <script type="module" src="/src/daggerquest.ts"></script>
</body>
</html>
