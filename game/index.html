<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>DaggerQuest</title>
    <style>
        @font-face {
            font-family: 'Cinzel';
            src: url('/fonts/cinzel-semibold.woff2') format('woff2');
            font-weight: 600;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: 'Grenze';
            src: url('/fonts/grenze-semibold.woff2') format('woff2');
            font-weight: 600;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: 'Grenze';
            src: url('/fonts/grenze-semibolditalic.woff2') format('woff2');
            font-weight: 600;
            font-style: italic;
            font-display: block;
        }
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
        }
        canvas {
            background-color: black;
        }

        /* ── Login Screen ─────────────────────────────────────────── */
        #login-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1209 0%, #0a0a0a 70%);
            z-index: 9999;
            font-family: 'Cinzel', 'Georgia', serif;
            color: #c8b06b;
            transition: opacity 0.5s ease;
        }
        #login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #login-title {
            margin-bottom: 16px;
        }
        #login-title img {
            max-width: 280px;
            height: auto;
        }

        #login-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 280px;
        }
        #login-form input {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 16px;
            padding: 10px 14px;
            border: 1px solid #3a3020;
            border-radius: 4px;
            background: rgba(20, 16, 8, 0.8);
            color: #d4c28a;
            outline: none;
            transition: border-color 0.2s;
        }
        #login-form input::placeholder {
            color: #6a5e3e;
        }
        #login-form input:focus {
            border-color: #c8a84e;
        }
        #login-form button {
            font-family: 'Cinzel', 'Georgia', serif;
            font-size: 15px;
            padding: 11px 0;
            margin-top: 4px;
            border: 1px solid #5a4a28;
            border-radius: 4px;
            background: linear-gradient(180deg, #3a2e14 0%, #241c08 100%);
            color: #d4c28a;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.2s, border-color 0.2s;
        }
        #login-form button:hover {
            background: linear-gradient(180deg, #4a3e1c 0%, #2e2410 100%);
            border-color: #8a7430;
        }

        #login-error {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 14px;
            color: #cc6644;
            height: 20px;
            margin-top: 6px;
            text-align: center;
        }

        /* ── Loading Bar (after login) ────────────────────────────── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1209 0%, #0a0a0a 70%);
            z-index: 9998;
            font-family: 'Cinzel', 'Georgia', serif;
            color: #c8b06b;
            transition: opacity 0.5s ease;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-status {
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 24px;
            color: #a89860;
        }

        #loading-bar-track {
            width: 320px;
            height: 14px;
            border: 1px solid #3a3020;
            border-radius: 7px;
            background: rgba(20, 16, 8, 0.8);
            overflow: hidden;
        }
        #loading-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8a6e1e, #d4aa30);
            border-radius: 7px;
            transition: width 0.3s ease;
        }

        /* ── Character Select Screen ──────────────────────────────── */
        #charselect-overlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1209 0%, #0a0a0a 70%);
            z-index: 9997;
            font-family: 'Cinzel', 'Georgia', serif;
            color: #c8b06b;
            transition: opacity 0.5s ease;
        }
        #charselect-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #charselect-title {
            font-size: 28px;
            letter-spacing: 3px;
            margin-bottom: 32px;
            color: #d4c28a;
        }

        #charselect-slots {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .charselect-slot {
            width: 220px;
            min-height: 180px;
            border: 1px solid #3a3020;
            border-radius: 8px;
            background: rgba(20, 16, 8, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .charselect-slot:hover {
            border-color: #5a4a28;
            box-shadow: 0 0 12px rgba(200, 168, 78, 0.15);
        }

        .charselect-slot-info {
            text-align: center;
            margin-bottom: 18px;
        }
        .charselect-slot-name {
            font-family: 'Cinzel', 'Georgia', serif;
            font-size: 18px;
            color: #d4c28a;
            margin-bottom: 4px;
        }
        .charselect-slot-detail {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 15px;
            color: #8a7a52;
        }

        .charselect-slot-empty {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 17px;
            color: #5a5032;
            margin-bottom: 16px;
        }

        .charselect-slot-actions {
            display: flex;
            gap: 10px;
        }

        .charselect-btn {
            font-family: 'Cinzel', 'Georgia', serif;
            font-size: 13px;
            padding: 8px 18px;
            border: 1px solid #5a4a28;
            border-radius: 4px;
            background: linear-gradient(180deg, #3a2e14 0%, #241c08 100%);
            color: #d4c28a;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s, border-color 0.2s;
        }
        .charselect-btn:hover:not(:disabled) {
            background: linear-gradient(180deg, #4a3e1c 0%, #2e2410 100%);
            border-color: #8a7430;
        }
        .charselect-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .charselect-btn-play {
            background: linear-gradient(180deg, #2e4a14 0%, #1a3008 100%);
            border-color: #4a7428;
        }
        .charselect-btn-play:hover {
            background: linear-gradient(180deg, #3a5e1c 0%, #243a10 100%) !important;
            border-color: #6a9438 !important;
        }

        .charselect-btn-delete {
            background: linear-gradient(180deg, #4a1414 0%, #300808 100%);
            border-color: #742828;
        }
        .charselect-btn-delete:hover {
            background: linear-gradient(180deg, #5e1c1c 0%, #3a1010 100%) !important;
            border-color: #943838 !important;
        }

        .charselect-btn-danger {
            background: linear-gradient(180deg, #4a1414 0%, #300808 100%);
            border-color: #742828;
            color: #e88;
        }
        .charselect-btn-danger:hover:not(:disabled) {
            background: linear-gradient(180deg, #5e1c1c 0%, #3a1010 100%);
            border-color: #943838;
        }

        /* ── Create / Delete Panel ────────────────────────────────── */
        #charselect-create {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 420px;
            padding: 24px;
            border: 1px solid #3a3020;
            border-radius: 8px;
            background: rgba(20, 16, 8, 0.92);
        }

        .charselect-create-title {
            font-size: 20px;
            letter-spacing: 2px;
            color: #d4c28a;
            margin-bottom: 4px;
        }

        #charselect-create input[type="text"] {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 16px;
            padding: 10px 14px;
            border: 1px solid #3a3020;
            border-radius: 4px;
            background: rgba(20, 16, 8, 0.8);
            color: #d4c28a;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        #charselect-create input[type="text"]::placeholder {
            color: #6a5e3e;
        }
        #charselect-create input[type="text"]:focus {
            border-color: #c8a84e;
        }

        .charselect-class-picker {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .charselect-class-btn {
            flex: 1;
            padding: 14px 12px;
            border: 1px solid #3a3020;
            border-radius: 6px;
            background: rgba(30, 24, 12, 0.8);
            cursor: pointer;
            text-align: center;
            transition: border-color 0.2s, background 0.2s;
        }
        .charselect-class-btn:hover {
            border-color: #5a4a28;
            background: rgba(40, 32, 16, 0.9);
        }
        .charselect-class-btn.selected {
            border-color: #c8a84e;
            background: rgba(60, 48, 20, 0.9);
            box-shadow: 0 0 10px rgba(200, 168, 78, 0.2);
        }

        .charselect-class-name {
            font-family: 'Cinzel', 'Georgia', serif;
            font-size: 15px;
            color: #d4c28a;
            margin-bottom: 6px;
        }
        .charselect-class-desc {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 13px;
            color: #8a7a52;
            line-height: 1.4;
        }

        .charselect-create-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }

        .charselect-delete-warning {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 16px;
            color: #c89a6a;
            text-align: center;
            line-height: 1.5;
        }

        #charselect-error {
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 14px;
            color: #cc6644;
            height: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Login overlay — renders instantly, no JS needed -->
    <div id="login-overlay">
        <div id="login-title"><img src="logo.webp" alt="DaggerQuest" /></div>
        <form id="login-form" autocomplete="off">
            <input type="text" id="login-email" placeholder="Email" />
            <div id="password-requirements" style="display:none;font-family:'Grenze','Georgia',serif;font-size:16px;color:#8a7a52;margin:4px 0;text-align:left;">
                Password must contain:
                <ul style="margin:2px 0 0;padding-left:8px;list-style:none;">
                    <li data-req="length"><span class="req-icon">✗</span> At least 8 characters</li>
                    <li data-req="upper"><span class="req-icon">✗</span> An uppercase letter</li>
                    <li data-req="lower"><span class="req-icon">✗</span> A lowercase letter</li>
                    <li data-req="digit"><span class="req-icon">✗</span> A number</li>
                    <li data-req="special"><span class="req-icon">✗</span> A special character</li>
                </ul>
            </div>
            <input type="text" id="login-password" placeholder="Password" style="-webkit-text-security:disc;" />
            <input type="text" id="login-confirm" placeholder="Confirm Password" style="display:none;-webkit-text-security:disc;" />
            <button type="submit" id="login-submit">Sign In</button>
        </form>
        <div id="login-error"></div>
        <div id="login-toggle" style="
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 17px;
            color: #8a7a52;
            margin-top: 14px;
            cursor: pointer;
            transition: color 0.2s;
        ">No account? <span style="color:#c8a84e;text-decoration:underline;">Create one</span></div>
        <div id="forgot-password" style="
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 15px;
            color: #8a7a52;
            margin-top: 8px;
            cursor: pointer;
            transition: color 0.2s;
        "><span style="color:#c8a84e;text-decoration:underline;">Forgot password?</span></div>
        <div id="sign-in-link" style="
            display: none;
            font-family: 'Grenze', 'Georgia', serif;
            font-size: 15px;
            color: #8a7a52;
            margin-top: 8px;
            cursor: pointer;
            transition: color 0.2s;
        "><span style="color:#c8a84e;text-decoration:underline;">Sign in with email</span></div>
    </div>

    <!-- Loading overlay — shown after successful login -->
    <div id="loading-overlay">
        <div id="loading-status">Loading...</div>
        <div id="loading-bar-track">
            <div id="loading-bar-fill"></div>
        </div>
    </div>

    <!-- Character select overlay — shown after login, before loading -->
    <div id="charselect-overlay">
        <div id="charselect-title">Select Character</div>
        <div id="charselect-slots"></div>
        <div id="charselect-create"></div>
        <div id="charselect-error"></div>
    </div>

    <script type="module" src="src/daggerquest.ts"></script>
</body>
</html>
